version: 2
updates:
- package-ecosystem: "maven"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  groups:
    github-codeql-action:
      patterns:
      - "github/codeql-action*"
- package-ecosystem: "devcontainers"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
